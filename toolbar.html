<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<style>
  :root{--bg:#faf8f5;--card:#fff;--ink:#1f2430;--soft:#5b6472;--line:#e6e3dd;
    --brand:#d97757;--deep:#b8492c;--paper:#fbf3ec;--ok:#1f9d57;}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:56px;overflow:hidden}
  body{background:var(--card);border-bottom:1px solid var(--line);
    font-family:"Microsoft YaHei","PingFang SC",sans-serif;
    display:flex;align-items:center;gap:10px;padding:0 14px;-webkit-user-select:none}
  .brand{font-weight:700;color:var(--deep);font-size:15px;white-space:nowrap;margin-right:6px}
  .btn{display:inline-flex;align-items:center;gap:6px;border:none;border-radius:8px;
    padding:8px 16px;font-size:13.5px;font-weight:700;cursor:pointer;
    background:var(--brand);color:#fff;transition:background .15s}
  .btn:hover{background:var(--deep)}
  .btn.ghost{background:var(--card);color:var(--ink);border:1px solid var(--line)}
  .btn.ghost:hover{border-color:var(--brand);color:var(--deep)}
  .spacer{flex:1}
  .dot{width:7px;height:7px;border-radius:50%;background:#c9ccd2;display:inline-block}
  .dot.on{background:var(--ok)}
  .status{font-size:12px;color:var(--soft);white-space:nowrap}
  /* 设置弹层 */
  #mask{position:fixed;inset:0;background:rgba(0,0,0,.35);display:none;align-items:center;justify-content:center;z-index:10}
  #mask.show{display:flex}
  .modal{background:var(--card);border-radius:12px;padding:20px;width:420px;max-width:92vw;
    box-shadow:0 8px 30px rgba(0,0,0,.2)}
  .modal h3{font-size:15px;margin-bottom:4px}
  .modal p{font-size:12px;color:var(--soft);margin-bottom:12px;line-height:1.6}
  .modal label{font-size:12px;font-weight:700;display:block;margin:8px 0 3px}
  .modal input{width:100%;border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:13px;outline:none;font-family:Consolas,monospace}
  .modal input:focus{border-color:var(--brand)}
  .row{display:flex;gap:8px;margin-top:14px}
  .link{color:var(--deep);font-weight:700;cursor:pointer;text-decoration:underline;font-size:12px}
</style>
</head>
<body>
  <span class="brand">风云AI工具站</span>
  <button class="btn" onclick="launch('cc')">▶ 启动 Claude Code</button>
  <button class="btn" onclick="launch('codex')">▶ 启动 Codex</button>
  <span class="spacer"></span>
  <span class="status"><span id="dot" class="dot"></span> <span id="statusText">未配置 Key</span></span>
  <button class="btn ghost" onclick="openSettings()">设置</button>

  <div id="mask">
    <div class="modal">
      <h3>专属 API 配置</h3>
      <p>在网站「控制台 → 我的 API Key」复制你的专属 Key 粘到这里。启动 CC/Codex 时会用它驱动国产大模型。
        <span class="link" onclick="fy.goConsole()">去控制台拿 Key →</span>
      </p>
      <label>专属 API Key</label>
      <input id="apiKey" placeholder="fy 开头的 48 位 Key" spellcheck="false" />
      <label>接入地址 Base URL</label>
      <input id="baseUrl" placeholder="http://..." spellcheck="false" />
      <div class="row">
        <button class="btn" style="flex:1" onclick="saveCfg()">保存</button>
        <button class="btn ghost" style="flex:1" onclick="closeSettings()">取消</button>
      </div>
      <p id="msg" style="margin-top:8px;margin-bottom:0"></p>
    </div>
  </div>

  <div id="dlmask" style="position:fixed;inset:0;background:rgba(255,255,255,.96);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:20;gap:14px">
    <p id="dltitle" style="font-weight:700;color:#1f2430;font-size:15px"></p>
    <div style="width:min(70vw,420px);height:12px;background:#eee;border-radius:99px;overflow:hidden">
      <div id="dlbar" style="height:100%;width:0;background:#d97757;transition:width .2s"></div>
    </div>
    <p id="dlsub" style="font-size:12px;color:#5b6472"></p>
  </div>

<script>
  const fmtMB = (b)=> (b/1048576).toFixed(0)+'MB';
  window.fy.onProgress((p)=>{
    const mask=document.getElementById('dlmask');
    if(p.phase==='start'){ mask.style.display='flex'; document.getElementById('dltitle').textContent='首次使用，正在下载 '+p.label+'（仅此一次）'; document.getElementById('dlbar').style.width='0'; document.getElementById('dlsub').textContent='准备中…'; }
    else if(p.phase==='downloading'){ document.getElementById('dlbar').style.width=p.percent+'%'; document.getElementById('dlsub').textContent=p.percent+'%  '+fmtMB(p.got)+' / '+fmtMB(p.total); }
    else if(p.phase==='extracting'){ document.getElementById('dlbar').style.width='100%'; document.getElementById('dlsub').textContent='解压中…'; }
    else if(p.phase==='done'||p.phase==='error'){ mask.style.display='none'; }
  });
  async function refreshStatus(){
    const c = await window.fy.getConfig();
    const on = !!(c && c.apiKey);
    document.getElementById('dot').className = 'dot' + (on ? ' on' : '');
    document.getElementById('statusText').textContent = on ? 'Key 已配置' : '未配置 Key';
    return c;
  }
  async function launch(tool){
    const r = await window.fy.launch(tool);
    if(!r.ok){ alert(r.error); openSettings(); }
  }
  async function openSettings(){
    const c = await refreshStatus();
    document.getElementById('apiKey').value = c.apiKey || '';
    document.getElementById('baseUrl').value = c.baseUrl || 'http://115.29.233.78:3100';
    document.getElementById('msg').textContent = '';
    document.getElementById('mask').classList.add('show');
  }
  function closeSettings(){ document.getElementById('mask').classList.remove('show'); }
  async function saveCfg(){
    const apiKey = document.getElementById('apiKey').value.trim();
    const baseUrl = document.getElementById('baseUrl').value.trim();
    await window.fy.saveConfig({ apiKey, baseUrl });
    document.getElementById('msg').textContent = '已保存';
    document.getElementById('msg').style.color = '#1f9d57';
    await refreshStatus();
    setTimeout(closeSettings, 700);
  }
  refreshStatus();
</script>
</body>
</html>
